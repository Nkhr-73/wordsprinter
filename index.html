<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordSprint</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Poppins",sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4F8CFF,#7F5AF0);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:min(900px,90%);
            color:white;
            text-align:center;
        }

        h1{
            font-size:4rem;
            font-weight:700;
        }

        .subtitle{
            margin-top:10px;
            font-size:1.2rem;
            opacity:.9;
        }

        .cards{
            margin-top:60px;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:25px;
        }

        .card{
            background:rgba(255,255,255,.15);
            backdrop-filter:blur(15px);
            border-radius:20px;
            padding:30px;
            transition:.25s;
            cursor:pointer;
            border:1px solid rgba(255,255,255,.25);
        }

        .card:hover{
            transform:translateY(-8px);
            background:rgba(255,255,255,.22);
        }

        .icon{
            font-size:55px;
            margin-bottom:15px;
        }

        .card h2{
            margin-bottom:10px;
        }

        .card p{
            opacity:.85;
            font-size:.95rem;
        }

        footer{
            margin-top:50px;
            opacity:.75;
            font-size:.9rem;
        }
    </style>
</head>
    <script src="script.js"></script>
<body>

<div class="container">

    <h1>🏃 WordSprint</h1>

    <p class="subtitle">
        Learn Faster. Remember Longer.
    </p>

    <div class="cards">

        <div class="card">
            <div class="icon">📖</div>
            <h2>Study</h2>
            <p>英単語を学習する</p>
        </div>

        <div class="card">
            <div class="icon">📝</div>
            <h2>Test</h2>
            <p>理解度をチェック</p>
        </div>

        <div class="card">
            <div class="icon">⭐</div>
            <h2>Review</h2>
            <p>苦手単語を復習</p>
        </div>

        <div class="card">
            <div class="icon">📊</div>
            <h2>Statistics</h2>
            <p>学習状況を見る</p>
        </div>

    </div>

    <footer>
        Version 1.0
    </footer>
    <section class="development">

    <h2>🛠 Development</h2>

    <a href="import.html" class="menu-button">
        📥 Import
    </a>

</section>

</div>

</body>
</html>
